<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Waves</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #09090b;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #09090b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #start-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #start-overlay h1 {
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 0.2em;
            color: #ffffff;
        }

        #start-overlay .subtitle {
            font-size: clamp(0.9rem, 1.8vw, 1.05rem);
            color: #a1a1aa;
            margin-bottom: 0.4em;
            letter-spacing: -0.01em;
        }

        #start-overlay .formats {
            font-size: 0.75rem;
            color: #52525b;
            margin-bottom: 2.5em;
        }

        .start-btn {
            padding: 0.8em 2.2em;
            font-size: 0.95rem;
            font-weight: 500;
            background: #ffffff;
            border: 1px solid #ffffff;
            color: #000000;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .start-btn:hover {
            background: #e4e4e7;
            border-color: #e4e4e7;
            transform: translateY(-1px);
        }

        #controls {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translate(-50%, -10px);
            width: calc(100% - 3rem);
            max-width: 960px;
            height: 56px;
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #controls.visible {
            opacity: 1;
            transform: translate(-50%, 0);
            pointer-events: auto;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #e4e4e7;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .ctrl-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .demo-btn {
            padding: 0.45em 0.9em;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #a1a1aa;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .demo-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .demo-btn.active {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .slider-container label {
            font-size: 0.65rem;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1.5px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .upload-btn {
            padding: 0.45em 0.9em;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
        }

        #file-input {
            display: none;
        }

        .hint-label {
            font-size: 0.75rem;
            color: #52525b;
            white-space: nowrap;
        }

        .hint-label.hidden {
            display: none;
        }

        #info-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.6em 1.5em;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.8rem;
            color: #a1a1aa;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s ease;
            text-align: center;
        }

        #info-bar.visible {
            opacity: 1;
        }

        #now-playing {
            color: #ffffff;
            font-weight: 500;
        }

        .drop-area-hint {
            display: block;
            font-size: 0.7rem;
            color: #52525b;
            margin-top: 0.3em;
        }

        #drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            border: 2px dashed rgba(255, 255, 255, 0.15);
        }

        #drag-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        #drag-overlay .drag-content {
            text-align: center;
            color: #e4e4e7;
        }

        #drag-overlay .drag-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        #drag-overlay p {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        #drag-overlay .formats-hint {
            font-size: 0.8rem;
            color: #71717a;
        }

        @media (max-width: 1200px) {
            .hint-label {
                display: none;
            }
        }

        @media (max-width: 1024px) {
            #controls {
                height: auto;
                flex-direction: column;
                gap: 0.8rem;
                padding: 1rem;
                top: 1rem;
                width: calc(100% - 2rem);
            }

            .control-group {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .demo-btn {
                font-size: 0.65rem;
                padding: 0.4em 0.8em;
            }

            input[type="range"] {
                width: 60px;
            }

            .slider-container label {
                display: none;
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="grain-overlay"></div>
    <div class="vignette"></div>

    <div id="start-overlay">
        <h1>AUDIO REACTIVE WAVES</h1>
        <p class="subtitle">Made by Murad I.</p>
        <p class="formats">Supported: MP3, WAV, OGG</p>
        <button class="start-btn" id="start-btn">Start Experience</button>
    </div>

    <div id="controls">
        <div class="control-group">
            <button class="ctrl-btn" id="play-btn" title="Play/Pause">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
            <span class="hint-label" id="demo-hint">Select a demo</span>
            <button class="demo-btn" data-demo="1">Demo 1</button>
            <button class="demo-btn" data-demo="2">Demo 2</button>
        </div>
        <div class="control-group">
            <button class="upload-btn" id="upload-btn">Upload Audio</button>
            <span class="hint-label" id="upload-hint">Or upload audio</span>
            <input type="file" id="file-input" accept="audio/*">
            <div class="slider-container">
                <label>Vol</label>
                <input type="range" id="volume-slider" min="0" max="100" value="70">
            </div>
            <div class="slider-container">
                <label>React</label>
                <input type="range" id="sensitivity-slider" min="1" max="100" value="50">
            </div>
            <button class="ctrl-btn" id="mute-btn" title="Mute">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="info-bar">
        <span id="now-playing">Select a demo or drop a file to play</span>
        <span class="drop-area-hint">Drag & drop audio files anywhere</span>
    </div>

    <div id="drag-overlay">
        <div class="drag-content">
            <div class="drag-icon">🎵</div>
            <p>Drop to play</p>
            <span class="formats-hint">MP3, WAV, OGG supported</span>
        </div>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script>
        (function () {
            'use strict';

            const CONFIG = {
                WAVE_LAYERS: 4,
                PARTICLE_COUNT: 60,
                FFT_SIZE: 1024,
                SMOOTHING: 0.85,
                BASS_HZ: [20, 140],
                MID_HZ: [140, 2000],
                HIGH_HZ: [2000, 12000],
                IDLE_AMPLITUDE: 8,
                IDLE_SPEED: 0.02,
                AMP_BOOST: 120,
                SPEED_BOOST: 1.5,
                DETAIL_BOOST: 0.5,
                SPARKLE_BOOST: 3,
                NOISE_GATE: 0.02
            };

            const state = {
                isPlaying: false,
                isMuted: false,
                currentDemo: null,
                isUserAudio: false,
                sensitivity: 0.5,
                volume: 0.7,
                audioStarted: false,
                audioReady: false,
                userFileUrl: null,
                rawBass: 0,
                rawMid: 0,
                rawHigh: 0,
                bass: 0,
                mid: 0,
                high: 0,
                peakBass: 0.1,
                peakMid: 0.1,
                peakHigh: 0.1,
                hueOffset: 0,
                time: 0,
                lastTime: 0,
                bassBins: [0, 0],
                midBins: [0, 0],
                highBins: [0, 0]
            };

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const startOverlay = document.getElementById('start-overlay');
            const controls = document.getElementById('controls');
            const infoBar = document.getElementById('info-bar');
            const dragOverlay = document.getElementById('drag-overlay');
            const nowPlaying = document.getElementById('now-playing');
            const audioElement = document.getElementById('audio-element');

            let audioCtx = null;
            let analyser = null;
            let gainNode = null;
            let frequencyData = null;

            function resizeCanvas() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
                ctx.scale(dpr, dpr);
            }

            function noise(x, y, z) {
                const X = Math.floor(x) & 255; const Y = Math.floor(y) & 255; const Z = Math.floor(z) & 255;
                x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                const u = fade(x), v = fade(y), w = fade(z);
                const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
                const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
                return lerp(w, lerp(v, lerp(u, grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z)), lerp(u, grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z))), lerp(v, lerp(u, grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1)), lerp(u, grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1))));
            }
            function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            function lerp(t, a, b) { return a + t * (b - a); }
            function grad(hash, x, y, z) {
                const h = hash & 15; const u = h < 8 ? x : y; const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }
            const p = new Array(512);
            const permutation = [151, 160, 137, 91, 90, 15, 131, 13, 201, 95, 96, 53, 194, 233, 7, 225, 140, 36, 103, 30, 69, 142, 8, 99, 37, 240, 21, 10, 23, 190, 6, 148, 247, 120, 234, 75, 0, 26, 197, 62, 94, 252, 219, 203, 117, 35, 11, 32, 57, 177, 33, 88, 237, 149, 56, 87, 174, 20, 125, 136, 171, 168, 68, 175, 74, 165, 71, 134, 139, 48, 27, 166, 77, 146, 158, 231, 83, 111, 229, 122, 60, 211, 133, 230, 220, 105, 92, 41, 55, 46, 245, 40, 244, 102, 143, 54, 65, 25, 63, 161, 1, 216, 80, 73, 209, 76, 132, 187, 208, 89, 18, 169, 200, 196, 135, 130, 116, 188, 159, 86, 164, 100, 109, 198, 173, 186, 3, 64, 52, 217, 226, 250, 124, 123, 5, 202, 38, 147, 118, 126, 255, 82, 85, 212, 207, 206, 59, 227, 47, 16, 58, 17, 182, 189, 28, 42, 223, 183, 170, 213, 119, 248, 152, 2, 44, 154, 163, 70, 221, 153, 101, 155, 167, 43, 172, 9, 129, 22, 39, 253, 19, 98, 108, 110, 79, 113, 224, 232, 178, 185, 112, 104, 218, 246, 97, 228, 251, 34, 242, 193, 238, 210, 144, 12, 191, 179, 162, 241, 81, 51, 145, 235, 249, 14, 239, 107, 49, 192, 214, 31, 181, 199, 106, 157, 184, 84, 204, 176, 115, 121, 50, 45, 127, 4, 150, 254, 138, 236, 205, 93, 222, 114, 67, 29, 24, 72, 243, 141, 128, 195, 78, 66, 215, 61, 156, 180];
            for (let i = 0; i < 256; i++) p[256 + i] = p[i] = permutation[i];

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const binSize = audioCtx.sampleRate / CONFIG.FFT_SIZE;
                state.bassBins = [Math.floor(CONFIG.BASS_HZ[0] / binSize), Math.floor(CONFIG.BASS_HZ[1] / binSize)];
                state.midBins = [Math.floor(CONFIG.MID_HZ[0] / binSize), Math.floor(CONFIG.MID_HZ[1] / binSize)];
                state.highBins = [Math.floor(CONFIG.HIGH_HZ[0] / binSize), Math.min(Math.floor(CONFIG.HIGH_HZ[1] / binSize), CONFIG.FFT_SIZE / 2 - 1)];
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = CONFIG.FFT_SIZE;
                analyser.smoothingTimeConstant = CONFIG.SMOOTHING;
                gainNode = audioCtx.createGain();
                gainNode.gain.value = state.volume;
                gainNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                frequencyData = new Uint8Array(analyser.frequencyBinCount);
            }

            const DEMO_TRACKS = {
                1: { name: 'Viper (Demo 1)', url: 'https://mdn.github.io/webaudio-examples/audio-analyser/viper.mp3' },
                2: { name: 'Outfoxing (Demo 2)', url: 'https://mdn.github.io/webaudio-examples/output-timestamp/outfoxing.mp3' }
            };

            function stopDemoSynth() { }

            function loadUserAudio(file) {
                hideHints();
                if (state.userFileUrl) URL.revokeObjectURL(state.userFileUrl);
                state.userFileUrl = URL.createObjectURL(file);
                audioElement.src = state.userFileUrl;
                state.isUserAudio = true; state.currentDemo = null;
                nowPlaying.textContent = file.name;
                document.querySelectorAll('.demo-btn').forEach(btn => btn.classList.remove('active'));
                if (!audioElement._sourceNode) {
                    const source = audioCtx.createMediaElementSource(audioElement);
                    source.connect(gainNode);
                    audioElement._sourceNode = source;
                }
                stopDemoSynth();
                audioElement.play();
                state.isPlaying = true;
                updatePlayButton();
            }

            function analyzeAudio() {
                if (!analyser || !frequencyData) return;
                analyser.getByteFrequencyData(frequencyData);
                let bassSum = 0, midSum = 0, highSum = 0;
                let bC = 0, mC = 0, hC = 0;
                for (let i = state.bassBins[0]; i <= state.bassBins[1]; i++) { bassSum += frequencyData[i]; bC++; }
                for (let i = state.midBins[0]; i <= state.midBins[1]; i++) { midSum += frequencyData[i]; mC++; }
                for (let i = state.highBins[0]; i <= state.highBins[1]; i++) { highSum += frequencyData[i]; hC++; }
                const rawBass = bC > 0 ? (bassSum / bC / 255) : 0;
                const rawMid = mC > 0 ? (midSum / mC / 255) : 0;
                const rawHigh = hC > 0 ? (highSum / hC / 255) : 0;
                state.peakBass = Math.max(state.peakBass * 0.995, rawBass, 0.05);
                state.peakMid = Math.max(state.peakMid * 0.995, rawMid, 0.05);
                state.peakHigh = Math.max(state.peakHigh * 0.995, rawHigh, 0.05);
                const normBass = rawBass / state.peakBass, normMid = rawMid / state.peakMid, normHigh = rawHigh / state.peakHigh;
                const sens = state.sensitivity * 1.5;
                const gatedBass = normBass < CONFIG.NOISE_GATE ? 0 : normBass * sens;
                const gatedMid = normMid < CONFIG.NOISE_GATE ? 0 : normMid * sens;
                const gatedHigh = normHigh < CONFIG.NOISE_GATE ? 0 : normHigh * sens;
                state.rawBass = Math.min(1, gatedBass); state.rawMid = Math.min(1, gatedMid); state.rawHigh = Math.min(1, gatedHigh);
                state.bass = gatedBass > state.bass ? lerp(0.35, state.bass, gatedBass) : lerp(0.12, state.bass, gatedBass);
                state.mid = gatedMid > state.mid ? lerp(0.25, state.mid, gatedMid) : lerp(0.1, state.mid, gatedMid);
                state.high = gatedHigh > state.high ? lerp(0.45, state.high, gatedHigh) : lerp(0.18, state.high, gatedHigh);
            }

            const particles = [];
            class Particle {
                constructor() { this.reset(); }
                reset() { this.x = Math.random() * window.innerWidth; this.y = Math.random() * window.innerHeight; this.size = Math.random() * 2 + 0.5; this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3; this.life = Math.random() * 100 + 50; this.maxLife = this.life; this.hue = Math.random() * 60 - 30; }
                update(high) { this.x += this.speedX * high * 2; this.y += this.speedY - high * 0.8; this.life--; if (this.life <= 0 || this.x < 0 || this.x > window.innerWidth || this.y < 0 || this.y > window.innerHeight) { this.reset(); this.y = window.innerHeight + 10; } }
                draw(ctx, baseHue, alpha) { const opacity = (this.life / this.maxLife) * alpha * 0.6; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (1 + state.high * 0.5), 0, Math.PI * 2); ctx.fillStyle = `hsla(${(baseHue + this.hue) % 360}, 80%, 70%, ${opacity})`; ctx.fill(); }
            }
            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) particles.push(new Particle());

            function drawWaves() {
                const w = window.innerWidth, h = window.innerHeight;
                state.hueOffset += 0.05 + state.mid * 0.3;
                const baseHue = (state.hueOffset * 0.3) % 360;
                ctx.fillStyle = `hsl(${baseHue}, 25%, 4%)`;
                ctx.fillRect(0, 0, w, h);
                for (let layer = CONFIG.WAVE_LAYERS - 1; layer >= 0; layer--) {
                    const amp = (CONFIG.IDLE_AMPLITUDE * (1 + layer * 0.3)) + (state.bass * CONFIG.AMP_BOOST * (1 - layer / CONFIG.WAVE_LAYERS * 0.3));
                    const flow = state.time * (0.1 + CONFIG.IDLE_SPEED + (state.bass * 0.8 + state.mid * 0.4) * CONFIG.SPEED_BOOST);
                    ctx.beginPath(); ctx.moveTo(0, h);
                    for (let x = 0; x <= w; x += 3) {
                        const y = h * (0.55 + (layer / CONFIG.WAVE_LAYERS) * 0.3) + Math.sin(x * (0.002 - layer * 0.0003) + flow) * amp;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h); ctx.fillStyle = `hsla(${(baseHue + layer * 35) % 360}, 40%, 20%, 0.3)`; ctx.fill();
                }
                if (state.high > 0.15) {
                    particles.forEach(p => { p.update(state.high); p.draw(ctx, baseHue, Math.min(1, Math.pow(state.high, 2) * CONFIG.SPARKLE_BOOST)); });
                }
            }

            let animationId = null;
            function animate(timestamp) {
                const dt = timestamp - state.lastTime; state.lastTime = timestamp;
                state.time += dt * 0.001 * (state.isPlaying ? 1 : 0.2);
                if (state.isPlaying) analyzeAudio();
                else { state.bass = lerp(0.05, state.bass, 0); state.mid = lerp(0.05, state.mid, 0); state.high = lerp(0.05, state.high, 0); }
                drawWaves();
                animationId = requestAnimationFrame(animate);
            }

            function startAnimation() { if (!animationId) { state.lastTime = performance.now(); animationId = requestAnimationFrame(animate); } }
            function updatePlayButton() {
                const btn = document.getElementById('play-btn');
                btn.innerHTML = state.isPlaying ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                btn.classList.toggle('active', state.isPlaying);
            }
            function togglePlay() { if (state.audioReady) { if (audioElement.paused) { audioElement.play(); state.isPlaying = true; } else { audioElement.pause(); state.isPlaying = false; } updatePlayButton(); } }
            function hideHints() { document.querySelectorAll('.hint-label').forEach(el => el.classList.add('hidden')); }

            function selectDemo(demoNum) {
                if (!state.audioReady) return;
                hideHints();
                state.currentDemo = demoNum; state.isUserAudio = false;
                document.querySelectorAll('.demo-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.demo) === demoNum));
                audioElement.src = DEMO_TRACKS[demoNum].url; nowPlaying.textContent = DEMO_TRACKS[demoNum].name;
                if (!audioElement._sourceNode) { const src = audioCtx.createMediaElementSource(audioElement); src.connect(gainNode); audioElement._sourceNode = src; }
                audioElement.play(); state.isPlaying = true; updatePlayButton();
            }

            function init() {
                resizeCanvas();
                document.getElementById('start-btn').addEventListener('click', () => {
                    initAudio(); startOverlay.classList.add('hidden'); controls.classList.add('visible'); infoBar.classList.add('visible');
                    state.audioStarted = true; state.audioReady = true; startAnimation();
                });
                document.getElementById('play-btn').addEventListener('click', togglePlay);
                document.querySelectorAll('.demo-btn').forEach(btn => btn.addEventListener('click', () => selectDemo(parseInt(btn.dataset.demo))));
                document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
                document.getElementById('file-input').addEventListener('change', (e) => { if (e.target.files[0]) loadUserAudio(e.target.files[0]); });
                document.getElementById('volume-slider').addEventListener('input', (e) => { state.volume = e.target.value / 100; if (gainNode) gainNode.gain.value = state.isMuted ? 0 : state.volume; });
                document.getElementById('sensitivity-slider').addEventListener('input', (e) => { state.sensitivity = e.target.value / 100; });
                const muteBtn = document.getElementById('mute-btn');
                muteBtn.addEventListener('click', () => {
                    state.isMuted = !state.isMuted;
                    if (gainNode) gainNode.gain.value = state.isMuted ? 0 : state.volume;
                    muteBtn.innerHTML = state.isMuted ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';
                });
                window.addEventListener('resize', resizeCanvas);
                audioElement.addEventListener('ended', () => { state.isPlaying = false; updatePlayButton(); });

                let dragCounter = 0;
                const dragOverlay = document.getElementById('drag-overlay');

                document.addEventListener('dragenter', (e) => {
                    e.preventDefault();
                    dragCounter++;
                    dragOverlay.classList.add('visible');
                });

                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });

                document.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    dragCounter--;
                    if (dragCounter === 0) {
                        dragOverlay.classList.remove('visible');
                    }
                });

                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dragCounter = 0;
                    dragOverlay.classList.remove('visible');

                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('audio/')) {
                        if (!state.audioStarted) {
                            initAudio();
                            startOverlay.classList.add('hidden');
                            controls.classList.add('visible');
                            infoBar.classList.add('visible');
                            state.audioStarted = true;
                            state.audioReady = true;
                            startAnimation();
                        }
                        loadUserAudio(file);
                    } else if (file) {
                        alert('Unsupported format. Please use MP3, WAV, or OGG files.');
                    }
                });
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        })();
    </script>
</body>

</html>
